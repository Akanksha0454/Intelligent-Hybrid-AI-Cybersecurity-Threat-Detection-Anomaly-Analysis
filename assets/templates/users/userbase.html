<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>A Novel Hybrid Approach for Threat Detection</title>
    <style>
        :root {
          --primary-color: #1e3a8a;
          --accent-color: #3b82f6;
          --bg-color: #f1f5f9;
          --text-color: #0f172a;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background-color: var(--bg-color);
          color: var(--text-color);
          line-height: 1.6;
        }

        header {
          background: linear-gradient(to right, #1e3a8a, #3b82f6);
          color: white;
          padding: 1rem 2rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: sticky;
          top: 0;
          z-index: 999;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        header h1 {
          font-size: 1.2rem;
        }

        nav ul {
          list-style: none;
          display: flex;
          gap: 1.5rem;
        }

        nav ul li a {
          color: white;
          text-decoration: none;
          font-weight: bold;
          transition: all 0.3s ease;
        }

        nav ul li a:hover {
          text-decoration: underline;
        }

        .menu-toggle {
          display: none;
          flex-direction: column;
          cursor: pointer;
        }

        .menu-toggle div {
          width: 25px;
          height: 3px;
          background-color: white;
          margin: 4px 0;
        }

        @media (max-width: 768px) {
          nav ul {
            flex-direction: column;
            background: var(--primary-color);
            position: absolute;
            top: 60px;
            right: 0;
            width: 200px;
            display: none;
          }

          nav ul.show {
            display: flex;
          }

          .menu-toggle {
            display: flex;
          }
        }

        main {
          padding: 2rem;
          max-width: 1100px; /* increased width */
          margin: 0 auto;
        }

        section {
          background: white;
          border-radius: 12px;
          padding: 2rem;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
          animation: fadeInUp 1s ease-in-out;
        }

        section h2 {
          color: var(--accent-color);
          margin-bottom: 1rem;
          font-size: 1.5rem;
        }

        section p {
          margin-bottom: 1rem;
          text-align: justify;
        }

        footer {
          text-align: center;
          padding: 1rem;
          background: var(--primary-color);
          color: white;
          margin-top: 2rem;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(30px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
    </style>
</head>
<body>

<header>
    <h1>Threat Detection in Cyber Security</h1>
    <div class="menu-toggle" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <nav>
        <ul id="menu">
            <li><a href="{% url 'UserHome' %}">Home</a></li>
            <li><a href="{% url 'dataset_view' %}">Dataset</a></li>
           
            <li><a href="{% url 'predict_view' %}">Predict Threat</a></li>
          
            <li><a href="{% url 'usr_classification' %}">Classification</a></li>

            <li><a href="{% url 'index' %}">Logout</a></li>
        </ul>
    </nav>
</header>

<main>
    {%block contents%}
    {%endblock%}
</main>

<footer>
    &copy; 2025 Cyber AI Solutions. All Rights Reserved.
</footer>

<script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.classList.toggle('show');
    }
</script>

</body>
</html>
