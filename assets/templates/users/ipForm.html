{% extends 'users/userbase.html' %}
{% load static %}
{% block contents %}

<section id="ip-form" class="max-w-lg mx-auto mt-12 p-8 bg-white shadow-lg rounded-lg">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800 flex items-center gap-2">🔍 Investigate IP Address</h2>
    <form action="{% url 'usr_get_ip_details' %}" method="post" class="space-y-6">
        {% csrf_token %}
        <div class="flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1">
                <label for="ip_address" class="block mb-2 text-sm font-medium text-gray-700">Enter IP Address</label>
                <input
                    type="text"
                    id="ip_address"
                    name="ip_address"
                    required autocomplete="off"
                    placeholder="e.g., 192.168.1.100"
                    class="w-full border border-gray-300 p-3 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>
            <div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg shadow-md transition-colors duration-200">
                    Submit
                </button>
            </div>
        </div>
    </form>
</section>



{% endblock %}
